<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Editar Usuário</title>
  <style>
    :root {
      --primary: #0A66C2;
      --primary-dark: #004182;
      --bg: #F3F2EF;
      --border: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      margin:0;
    }
    .center {
      max-width: 600px; margin:40px auto; background:#fff;
      padding:24px 28px; border-radius:12px;
      box-shadow:0 8px 30px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.03);
    }
    h1 { margin-top:0; }
    label { display:block; font-size:0.9rem; margin-bottom:4px; }
    input[type="text"], input[type="password"] {
      width:100%; padding:8px 10px; border-radius:4px;
      border:1px solid var(--border); margin-bottom:10px;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline:none;
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(10,102,194,0.15);
    }
    button {
      border:none; border-radius:999px; padding:8px 14px;
      font-size:0.9rem; cursor:pointer; background:var(--primary); color:#fff;
    }
    button:hover { background: var(--primary-dark); }
    .msg-erro { color:#b91c1c; font-size:0.85rem; }
    .msg-ok { color:#16a34a; font-size:0.85rem; }
    a { font-size:0.85rem; color: var(--primary); text-decoration:none; }
    a:hover { text-decoration:underline; }
    @media (max-width: 600px) {
      .center { margin:8px; padding:16px 14px; border-radius:0; }
    }
  </style>
</head>
<body>
  <div class="center">
    <h1>Editar Usuário</h1>

    {% for m in get_flashed_messages(category_filter=['erro']) %}
      <div class="msg-erro">{{ m }}</div>
    {% endfor %}
    {% for m in get_flashed_messages(category_filter=['sucesso']) %}
      <div class="msg-ok">{{ m }}</div>
    {% endfor %}

    <form method="post">
      <label for="username">Usuário</label>
      <input id="username" name="username" type="text" value="{{ usuario.username }}">

      <label for="password">Nova senha (opcional)</label>
      <input id="password" name="password" type="password" placeholder="Deixe em branco para não alterar">

      <label>
        <input type="checkbox" name="is_admin" value="1"
               {% if usuario.is_admin %}checked{% endif %}
               {% if usuario.username == 'admin' %} disabled{% endif %}>
        Admin
      </label>

      <div style="margin-top:12px;">
        <button type="submit">Salvar alterações</button>
        <a href="{{ url_for('usuarios') }}" style="margin-left:8px;">Cancelar</a>
      </div>
    </form>
  </div>
</body>
</html>
