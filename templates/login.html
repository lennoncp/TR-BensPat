<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Termo de Bens</title>
  <style>
    :root {
      --primary: #0A66C2;
      --primary-dark: #004182;
      --bg: #F3F2EF;
      --text-main: #191919;
      --border: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      margin: 0;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      margin: 24px;
      padding: 28px 32px;
      background:#fff;
      border-radius:12px;
      box-shadow:0 8px 30px rgba(0,0,0,0.08);
      border: 1px solid rgba(0,0,0,0.03);
    }
    h2 {
      margin: 0 0 16px;
      font-size: 1.35rem;
      font-weight: 600;
      text-align:center;
    }
    label { display:block; margin-bottom:4px; font-size:0.9rem; }
    input {
      width:100%;
      padding:10px 12px;
      margin-bottom:12px;
      border-radius:4px;
      border:1px solid var(--border);
      font-size:0.9rem;
    }
    input:focus {
      outline:none;
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(10,102,194,0.15);
    }
    button {
      width:100%;
      padding:10px 14px;
      border:none;
      border-radius:999px;
      background:var(--primary);
      color:#fff;
      font-size:0.95rem;
      font-weight:600;
      cursor:pointer;
    }
    button:hover {
      background: var(--primary-dark);
    }
    .error { color:#b91c1c; font-size:0.85rem; margin-bottom:8px; }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Acesso ao Termo</h2>

    {% with msgs = get_flashed_messages(category_filter=['erro']) %}
      {% if msgs %}
        <div class="error">{{ msgs[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="post">
      <label for="username">Usuário</label>
      <input id="username" name="username" type="text" placeholder="Digite seu usuário">
      <label for="password">Senha</label>
      <input id="password" name="password" type="password" placeholder="Digite sua senha">
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
